<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Session - Real Estate Development English</title>
    <link rel="stylesheet" href="quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 知晓云 SDK (Local) -->
    <script src="js/minapp-sdk.js"></script>
</head>

<body>

    <div class="header">
        <div class="user-info">
            <svg style="width:24px;height:24px" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span id="headerStudentName">未登录</span>
        </div>
        <div id="modeBadge" class="mode-badge mode-quiz">QUIZ MODE</div>
    </div>

    <!-- View 1: Selection (Fallback) -->
    <div id="viewSelection" class="quiz-card" style="display: none; text-align: center;">
        <h2>请选择测验</h2>
        <p style="color: var(--text-light); margin-bottom: 20px;">检测到未指定测验ID，请使用老师提供的专用链接进入。</p>
        <div style="font-size: 0.9rem; color: #ef4444; background: #fef2f2; padding: 10px; border-radius: 8px;">
            错误代码: MISSING_QUIZ_ID
        </div>
    </div>

    <!-- View 2: Entrance (Login) -->
    <div id="viewEntrance" class="quiz-card" style="display: none; max-width: 480px;">
        <h1 id="entranceTitle" style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Loading...
        </h1>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">学号</label>
                <input type="text" id="studentIdInput" class="form-input" placeholder="请输入完整学号"
                    style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem;">
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">姓名</label>
                <input type="text" id="studentNameInput" class="form-input" readonly
                    style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; background-color: #f3f4f6; color: #6b7280;">
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">考试口令</label>
                <input type="text" id="entryCodeInput" class="form-input" placeholder="请输入6位口令"
                    style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem; letter-spacing: 2px;">
            </div>

            <div id="loginFeedback" style="min-height: 24px; font-size: 0.9rem;"></div>

            <button id="btnStart" class="btn btn-primary" disabled
                style="width: 100%; padding: 16px; font-size: 1.1rem;">
                开始考试
            </button>
        </div>
    </div>

    <!-- View 3: Quiz Interface -->
    <div id="viewQuiz" style="display: none; width: 100%;">
        <div
            style="max-width: 600px; margin: 0 auto; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: 700; color: var(--text-light);">ID: <span id="currentQuizIDDisplay">--</span></div>
            <div id="timerDisplay" class="timer-float">剩余时间: --:--</div>
        </div>

        <div class="progress-container" style="max-width: 600px; margin: 0 auto 10px auto;">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div
            style="max-width: 600px; margin: 0 auto; text-align: right; margin-bottom: 20px; font-size: 0.875rem; color: var(--text-light);">
            题目: <span id="currentQuestionNum">0</span>/<span id="totalQuestionNum">10</span>
        </div>

        <main class="quiz-card" id="quizContainer">
            <div id="questionContent">
                <div class="question-text" id="questionText">正在加载题目...</div>
                <div class="options-list" id="optionsList">
                    <!-- Options populated by JS -->
                </div>
                <!-- Quiz mode typically doesn't show explanation immediately, but structure is here -->
                <div class="explanation-box" id="explanationBox">
                    <strong>解析:</strong>
                    <p id="explanationText"></p>
                </div>
            </div>

            <div class="footer-actions">
                <button class="btn btn-ghost" id="btnPrev" style="visibility: hidden;">上一题</button>
                <button class="btn btn-ghost" id="btnShowExplanation" style="display:none;">查看解析</button>
                <button class="btn btn-primary" id="btnNext" disabled>下一题</button>
            </div>
        </main>
    </div>

    <!-- Results Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div id="submittingState">
                <div class="spinner"></div>
                <p>提交中，请勿关闭页面...</p>
            </div>

            <div id="failureState" style="display: none;">
                <h2 style="color: #ef4444;">上传失败，请检查网络！</h2>
                <p style="font-size: 0.9rem; color: var(--text-light); margin: 10px 0;">记录已加密保存至本地，请尝试重新提交。</p>
                <button class="btn btn-primary" id="btnResubmit" style="width: 100%; margin-top: 15px;">重新提交</button>
                <div id="fallbackAction" style="display: none; margin-top: 20px;">
                    <p style="font-size: 0.85rem; color: var(--text-light);">多次失败？请点击下方链接导出凭证并发送给老师：</p>
                    <a href="#" id="linkDownloadVoucher"
                        style="color: var(--primary-color); font-weight: 600; text-decoration: underline; font-size: 0.85rem;">手动导出加密凭证</a>
                </div>
            </div>

            <div id="successState" style="display: none;">
                <h2 id="resultTitle">提交成功！</h2>
                <div id="scoreDisplayContainer">
                    <div class="score-text"><span id="finalScore">0</span></div>
                    <p id="resultMessage" style="margin-bottom: 30px; color: var(--text-light);"></p>
                </div>
                <!-- Mode Quiz will hide scoreDisplayContainer via inline style -->
                <button class="btn btn-primary" onclick="location.href='index.html'" style="width:100%">回首页</button>
                <div id="retakeContainer" style="margin-top: 15px; display: none;">
                    <button class="btn btn-secondary" id="btnRetake"
                        style="width: 100%; border: 1px solid var(--primary-color); color: var(--primary-color); background: transparent;">再测一次
                        (需口令)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="quiz_bank.js"></script>
    <script src="quiz.js"></script>
</body>

</html>
