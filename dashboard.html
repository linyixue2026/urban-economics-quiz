<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>📊 教师监控面板 - 城市经济学</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6366f1;--primary-light:#818cf8;--secondary:#10b981;--danger:#ef4444;--warning:#f59e0b;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px}
        .header{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:24px;border-radius:16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:1.5em}
        .header .subtitle{opacity:.85;margin-top:4px}
        .auto-refresh{background:rgba(255,255,255,.2);padding:6px 16px;border-radius:20px;font-size:.85em}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid var(--border)}
        .stat-card .label{font-size:.85em;color:var(--text2);margin-bottom:8px}
        .stat-card .value{font-size:2em;font-weight:700;color:var(--primary)}
        .stat-card .value.green{color:var(--secondary)}
        .stat-card .value.red{color:var(--danger)}
        .stat-card .value.orange{color:var(--warning)}
        .toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .toolbar select{padding:10px 16px;border:2px solid var(--border);border-radius:10px;font-size:.9em;background:var(--card)}
        .btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9em;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-light)}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-danger:hover{opacity:.8}
        table{width:100%;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid var(--border);border-collapse:collapse}
        th{background:#f1f5f9;padding:14px 16px;text-align:left;font-size:.85em;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border)}
        td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9em}
        tr:last-child td{border-bottom:none}
        tr:hover{background:#f8fafc}
        .score{font-weight:700;font-size:1.1em}
        .score.pass{color:var(--secondary)}
        .score.fail{color:var(--danger)}
        .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75em;font-weight:600}
        .badge-initial{background:#dbeafe;color:#1d4ed8}
        .badge-retake{background:#fef3c7;color:#b45309}
        .empty{text-align:center;padding:60px;color:var(--text2)}
        .empty .icon{font-size:3em;margin-bottom:16px}
        .loading{text-align:center;padding:40px;color:var(--text2)}
        .error-msg{background:#fef2f2;color:var(--danger);padding:16px;border-radius:12px;margin-bottom:16px}
        .test-bar{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:16px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .test-bar .status{font-weight:600}
        .test-bar .status.ok{color:var(--secondary)}
        .test-bar .status.fail{color:var(--danger)}
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>📊 城市经济学 - 教师监控面板</h1>
        <div class="subtitle">实时查看学生成绩提交情况</div>
    </div>
    <div class="auto-refresh" id="refreshStatus">🔄 每10秒自动刷新</div>
</div>

<!-- System Test Bar -->
<div class="test-bar" id="testBar">
    <span>系统状态：</span>
    <span class="status" id="systemStatus">检测中...</span>
    <button class="btn btn-primary" onclick="runSystemTest()" style="margin-left:auto">🔍 测试系统</button>
</div>

<!-- Stats -->
<div class="stats">
    <div class="stat-card">
        <div class="label">📝 已提交人数</div>
        <div class="value" id="totalCount">-</div>
    </div>
    <div class="stat-card">
        <div class="label">✅ 通过人数</div>
        <div class="value green" id="passCount">-</div>
    </div>
    <div class="stat-card">
        <div class="label">❌ 未通过人数</div>
        <div class="value red" id="failCount">-</div>
    </div>
    <div class="stat-card">
        <div class="label">📈 平均分</div>
        <div class="value orange" id="avgScore">-</div>
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <select id="quizFilter" onchange="loadScores()">
        <option value="">全部测验</option>
    </select>
    <select id="typeFilter" onchange="loadScores()">
        <option value="">全部类型</option>
        <option value="初试">初试</option>
        <option value="补试">补试</option>
    </select>
    <button class="btn btn-primary" onclick="loadScores()">🔄 刷新</button>
    <button class="btn btn-primary" onclick="exportCSV()">📥 导出 CSV</button>
</div>

<!-- Table -->
<div id="tableContainer">
    <div class="loading">加载中...</div>
</div>

<script>
const CONFIG = {
    apiUrl: 'https://urban-economics-quiz.linyixue2026.workers.dev'
};

let allRecords = [];

// Auto refresh every 10 seconds
setInterval(loadScores, 10000);

// Load on start
document.addEventListener('DOMContentLoaded', () => {
    runSystemTest();
    loadScores();
});

// System test
async function runSystemTest() {
    const el = document.getElementById('systemStatus');
    el.textContent = '检测中...';
    el.className = 'status';
    
    try {
        const resp = await fetch(CONFIG.apiUrl + '/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                quiz_title: '系统测试',
                student_id: 'SYSTEM_TEST',
                student_name: '系统检测',
                score: 0,
                duration: 0,
                switch_count: 0,
                exam_type: '初试',
                details: '自动测试'
            })
        });
        const result = await resp.json();
        if (result.success) {
            el.textContent = '✅ Worker API 正常 | 飞书 ✅ | Google Sheets ✅';
            el.className = 'status ok';
        } else {
            el.textContent = '⚠️ API 返回错误: ' + (result.error || '未知');
            el.className = 'status fail';
        }
    } catch(e) {
        el.textContent = '❌ 连接失败: ' + e.message;
        el.className = 'status fail';
    }
}

// Load scores from Worker
async function loadScores() {
    try {
        const quizFilter = document.getElementById('quizFilter').value;
        let url = CONFIG.apiUrl + '/api/scores';
        if (quizFilter) url += '?quiz=' + encodeURIComponent(quizFilter);
        
        const resp = await fetch(url);
        const data = await resp.json();
        
        if (data.records) {
            allRecords = data.records.filter(r => r['学号'] !== 'SYSTEM_TEST');
            renderTable();
            updateStats();
            updateQuizFilter();
        }
    } catch(e) {
        document.getElementById('tableContainer').innerHTML = 
            '<div class="error-msg">❌ 加载失败: ' + e.message + '</div>';
    }
}

function renderTable() {
    const typeFilter = document.getElementById('typeFilter').value;
    let records = allRecords;
    if (typeFilter) {
        records = records.filter(r => r['考试类型'] === typeFilter);
    }
    
    if (records.length === 0) {
        document.getElementById('tableContainer').innerHTML = `
            <div class="empty">
                <div class="icon">📭</div>
                <div>暂无成绩数据</div>
                <div style="margin-top:8px;font-size:.85em">学生提交成绩后会自动显示在这里</div>
            </div>
        `;
        return;
    }
    
    // Sort by time desc
    records.sort((a, b) => (b['提交时间'] || 0) - (a['提交时间'] || 0));
    
    let html = `<table>
        <tr>
            <th>#</th>
            <th>测验</th>
            <th>学号</th>
            <th>姓名</th>
            <th>成绩</th>
            <th>用时</th>
            <th>切屏</th>
            <th>类型</th>
            <th>提交时间</th>
        </tr>`;
    
    records.forEach((r, i) => {
        const score = r['成绩'] || 0;
        const scoreClass = score >= 60 ? 'pass' : 'fail';
        const duration = r['用时(秒)'] || 0;
        const mins = Math.floor(duration / 60);
        const secs = duration % 60;
        const typeBadge = r['考试类型'] === '补试' 
            ? '<span class="badge badge-retake">补试</span>' 
            : '<span class="badge badge-initial">初试</span>';
        const time = r['提交时间'] ? new Date(r['提交时间']).toLocaleString('zh-CN') : '-';
        
        html += `<tr>
            <td>${i + 1}</td>
            <td>${r['测验'] || '-'}</td>
            <td>${r['学号'] || '-'}</td>
            <td><b>${r['姓名'] || '-'}</b></td>
            <td><span class="score ${scoreClass}">${score}</span></td>
            <td>${mins}分${secs}秒</td>
            <td>${r['切屏次数'] || 0}</td>
            <td>${typeBadge}</td>
            <td>${time}</td>
        </tr>`;
    });
    
    html += '</table>';
    document.getElementById('tableContainer').innerHTML = html;
}

function updateStats() {
    const total = allRecords.length;
    const pass = allRecords.filter(r => (r['成绩'] || 0) >= 60).length;
    const fail = total - pass;
    const avg = total > 0 ? (allRecords.reduce((s, r) => s + (r['成绩'] || 0), 0) / total).toFixed(1) : '-';
    
    document.getElementById('totalCount').textContent = total;
    document.getElementById('passCount').textContent = pass;
    document.getElementById('failCount').textContent = fail;
    document.getElementById('avgScore').textContent = avg;
}

function updateQuizFilter() {
    const select = document.getElementById('quizFilter');
    const current = select.value;
    const quizzes = [...new Set(allRecords.map(r => r['测验']).filter(Boolean))];
    
    select.innerHTML = '<option value="">全部测验</option>';
    quizzes.forEach(q => {
        select.innerHTML += `<option value="${q}" ${q === current ? 'selected' : ''}>${q}</option>`;
    });
}

function exportCSV() {
    if (allRecords.length === 0) { alert('没有数据可导出'); return; }
    
    const headers = ['测验','学号','姓名','成绩','用时(秒)','切屏次数','考试类型','提交时间','详情'];
    let csv = '\uFEFF' + headers.join(',') + '\n';
    
    allRecords.forEach(r => {
        csv += [
            `"${r['测验'] || ''}"`,
            `"${r['学号'] || ''}"`,
            `"${r['姓名'] || ''}"`,
            r['成绩'] || 0,
            r['用时(秒)'] || 0,
            r['切屏次数'] || 0,
            `"${r['考试类型'] || ''}"`,
            r['提交时间'] ? new Date(r['提交时间']).toLocaleString('zh-CN') : '',
            `"${r['详情'] || ''}"`
        ].join(',') + '\n';
    });
    
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `城市经济学-成绩-${new Date().toLocaleDateString('zh-CN')}.csv`;
    a.click();
}
</script>
</body>
</html>
